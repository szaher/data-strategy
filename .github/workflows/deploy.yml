name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Validate content
        run: pnpm validate

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Exclude API routes for static export
        run: mv src/app/api src/app/_api

      - name: Build static site
        run: pnpm build
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"

      - name: Restore API routes
        run: mv src/app/_api src/app/api

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
